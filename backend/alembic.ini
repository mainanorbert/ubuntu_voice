[alembic]
# Path to the migrations folder
script_location = alembic

# File name template for generated revision scripts
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# sqlalchemy.url is intentionally left blank here.
# The URL is read at runtime from the DATABASE_URL / EIVEN_SERVICE_URL env var
# inside alembic/env.py so no secrets live in this file.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
